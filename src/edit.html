<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episode++</title>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="utils.js"></script>
    <script src="series.js"></script>
    <script src="edit.js"></script>
  </head>
  <body id="edit">
    <div class="popup edit-popup">
      <form name="editSeasonEpisodeURL" id="epp_edit_form" class="edit-form">
        <div class="form-section">
          <div class="form-group">
            <label for="epp_title" class="form-label">__MSG_editTitle__</label>
            <input type="text" id="epp_title" name="title" class="form-input" autofocus>
          </div>

          <div class="form-group">
            <label for="epp_url" class="form-label">__MSG_editURL__</label>
            <input type="url" id="epp_url" name="url" pattern="https?://.+" class="form-input">
          </div>

          <div class="form-row">
            <div class="form-group form-group-half">
              <label for="epp_season" class="form-label">__MSG_editSeason__</label>
              <input type="number" min="0" id="epp_season" name="season" value="0" class="form-input">
            </div>

            <div class="form-group form-group-half">
              <label for="epp_episode" class="form-label">__MSG_editEpisode__</label>
              <input type="number" min="0" id="epp_episode" name="episode" value="0" class="form-input">
            </div>
          </div>

          <div class="checkbox-section">
            <div class="checkbox-item">
              <input type="checkbox" id="epp_incognito" name="incognito" value="incognito">
              <label for="epp_incognito">__MSG_editIncognito__</label>
            </div>

            <div class="checkbox-item">
              <input type="checkbox" id="epp_contextMenu" name="contextMenu" value="contextMenu">
              <label for="epp_contextMenu">__MSG_editContextMenu__</label>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <a id="cancel" title="__MSG_cancel__" class="btn btn-secondary" href="popup.html">__MSG_editCancel__</a>
          <input type="submit" id="save" title="__MSG_save__" class="btn btn-primary" value="__MSG_save__">
        </div>
      </form>
    </div>
  </body>
</html>
